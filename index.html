<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>藥劑部 - 科務會議紀錄系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .modal-active { overflow: hidden; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        .animate-fadeIn { animation: fadeIn 0.2s ease-out forwards; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans pb-10">

    <header class="sticky top-0 z-10 bg-white shadow-sm border-b border-slate-200 px-4 py-3 sm:px-6">
        <div class="max-w-3xl mx-auto">
            <div class="flex items-center justify-between mb-3">
                <h1 class="text-xl sm:text-2xl font-bold text-teal-700 flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h10a2 2 0 012 2v1m2 13a2 2 0 01-2-2V7m2 13a2 2 0 002-2V9a2 2 0 00-2-2h-2m-4-3H9M7 16h6M7 8h6v4H7V8z" /></svg>
                    豐原醫院藥劑科 科務會議紀錄
                </h1>
                <a href="https://script.google.com/macros/s/AKfycbxUfBHRAP-IYsZ6IGpN4icI8FFWnpsIp2GL7caIzq7ePoNr3Zk7Xf-cKqWPb8J2qdQjFw/exec" target="_blank" class="text-sm bg-teal-600 text-white px-4 py-2 rounded-lg hover:bg-teal-700 transition font-bold shadow-sm">+ 上傳紀錄</a>
            </div>
            <div class="flex flex-col sm:flex-row gap-2">
                <div class="relative flex-grow">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <svg class="h-5 w-5 text-slate-400" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z" clip-rule="evenodd" /></svg>
                    </div>
                    <input type="text" id="searchInput" placeholder="搜尋日期或檔案名稱..." class="block w-full pl-10 pr-3 py-2 border border-slate-300 rounded-lg bg-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-teal-500 sm:text-sm">
                </div>
                <select id="yearFilter" class="block w-full sm:w-32 pl-3 pr-10 py-2 border border-slate-300 focus:outline-none focus:ring-2 focus:ring-teal-500 sm:text-sm rounded-lg bg-white">
                    <option value="all">所有年份</option>
                </select>
            </div>
        </div>
    </header>

    <main class="max-w-3xl mx-auto mt-6 px-4 sm:px-6">
        <div id="meetingList" class="flex flex-col gap-4">
            <!-- 初始載入動畫 -->
            <div class="text-center py-20"><div class="inline-block animate-spin rounded-full h-8 w-8 border-4 border-teal-500 border-t-transparent mb-4"></div><p class="text-slate-500">正在讀取雲端資料...</p></div>
        </div>
        <div id="noDataMessage" class="hidden text-center py-10 text-slate-500"><p>找不到符合條件的紀錄</p></div>
    </main>

    <!-- 刪除密碼驗證彈出視窗 (Modal) -->
    <div id="deleteModal" class="fixed inset-0 z-50 flex items-center justify-center hidden">
        <div class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm" onclick="closeDeleteModal()"></div>
        <div class="bg-white rounded-2xl shadow-2xl z-10 max-w-sm w-full mx-4 overflow-hidden animate-fadeIn p-6">
            <div class="flex items-center gap-3 text-red-600 mb-2">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
                <h3 id="modalTitle" class="text-lg font-bold">確認刪除檔案？</h3>
            </div>
            <p id="modalDesc" class="text-sm text-slate-500 mb-5">刪除後檔案將移至雲端硬碟垃圾桶，無法直接復原。</p>
            <div class="mb-4">
                <label class="block text-xs font-bold text-slate-400 mb-1 uppercase tracking-wider">請輸入管理密碼</label>
                <input type="password" id="adminPwdInput" class="w-full border border-slate-200 rounded-xl px-4 py-3 focus:ring-2 focus:ring-red-500 focus:outline-none transition-all" placeholder="輸入 4 位數密碼">
            </div>
            <div id="modalError" class="text-xs text-red-500 mb-4 hidden font-bold">密碼不正確，請重新輸入。</div>
            <div class="flex gap-3">
                <button onclick="closeDeleteModal()" class="flex-1 px-4 py-3 bg-slate-100 text-slate-600 rounded-xl font-bold hover:bg-slate-200 transition">取消</button>
                <button id="confirmDeleteBtn" class="flex-1 px-4 py-3 bg-red-600 text-white rounded-xl font-bold hover:bg-red-700 shadow-lg shadow-red-200 transition">確認刪除</button>
            </div>
        </div>
    </div>

    <!-- 訊息提示 (Toast) -->
    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 z-50 px-6 py-3 bg-slate-800 text-white rounded-full shadow-xl opacity-0 transition-all pointer-events-none text-sm font-bold"></div>

    <script>
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbxUfBHRAP-IYsZ6IGpN4icI8FFWnpsIp2GL7caIzq7ePoNr3Zk7Xf-cKqWPb8J2qdQjFw/exec';
        let meetingData = []; 
        let currentDeleteParams = { timestamp: null, fileUrl: null };

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg; t.classList.remove('opacity-0', 'translate-y-4');
            setTimeout(() => { t.classList.add('opacity-0', 'translate-y-4'); }, 3000);
        }

        function convertToPreviewLink(url) {
            if (!url) return '#';
            return url.includes('drive.google.com') ? url.replace(/\/view.*|\/edit.*/, '/preview') : url;
        }

        function renderCards(data) {
            const listContainer = document.getElementById('meetingList');
            listContainer.innerHTML = '';
            if (data.length === 0) { document.getElementById('noDataMessage').classList.remove('hidden'); return; }
            document.getElementById('noDataMessage').classList.add('hidden');

            data.forEach(item => {
                // 會議主檔區塊
                const recordHTML = item.recordData ? `
                    <div class="flex items-center gap-2 group">
                        <a href="${convertToPreviewLink(item.recordData.url)}" target="_blank" class="flex-grow flex items-center gap-2 bg-teal-600 text-white py-2.5 px-4 rounded-xl text-sm font-bold shadow-sm transition-all hover:bg-teal-700 active:scale-95">
                            <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                            <span class="truncate">${item.recordData.name}</span>
                        </a>
                        <button onclick="openDeleteModal('${item.timestamp}', '${item.recordData.url}')" class="p-2 text-slate-300 hover:text-red-500 transition-colors" title="刪除主檔">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                        </button>
                    </div>` : `<div class="p-2 border border-dashed border-slate-200 rounded-xl text-xs text-slate-400 text-center italic">主紀錄檔已移除</div>`;

                // 附件檔案清單
                let attachHTML = '';
                if (item.attachmentData && item.attachmentData.length > 0) {
                    item.attachmentData.forEach(file => {
                        attachHTML += `
                            <div class="flex items-center gap-2 group">
                                <a href="${convertToPreviewLink(file.url)}" target="_blank" class="flex-grow flex items-center gap-2 bg-white text-slate-600 border border-slate-200 py-2.5 px-4 rounded-xl text-sm font-medium transition-all hover:bg-slate-50 hover:border-slate-300 active:scale-95">
                                    <svg class="w-4 h-4 flex-shrink-0 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13"></path></svg>
                                    <span class="truncate">${file.name}</span>
                                </a>
                                <button onclick="openDeleteModal('${item.timestamp}', '${file.url}')" class="p-2 text-slate-300 hover:text-red-500 transition-colors" title="刪除附件">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                                </button>
                            </div>`;
                    });
                }

                const cardHTML = `
                    <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-5 transition-all hover:shadow-md">
                        <div class="flex justify-between items-center mb-5 border-b border-slate-50 pb-3">
                            <h2 class="font-black text-teal-800 flex items-center gap-2 text-lg">
                                <svg class="w-5 h-5 text-teal-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                                ${item.date} 會議紀錄
                            </h2>
                            <button onclick="openDeleteModal('${item.timestamp}')" class="text-[11px] text-slate-400 hover:text-red-600 uppercase font-black tracking-widest transition-colors">移除整份資料</button>
                        </div>
                        <div class="grid grid-cols-1 gap-5">
                            <div><p class="text-[10px] text-slate-400 font-black mb-1.5 ml-1 uppercase tracking-wider">會議主檔</p>${recordHTML}</div>
                            ${attachHTML ? `<div><p class="text-[10px] text-slate-400 font-black mb-1.5 ml-1 uppercase tracking-wider">相關附件</p><div class="flex flex-col gap-2">${attachHTML}</div></div>` : ''}
                        </div>
                    </div>`;
                listContainer.insertAdjacentHTML('beforeend', cardHTML);
            });
        }

        // --- Modal 控制邏輯 ---
        function openDeleteModal(ts, url = null) {
            currentDeleteParams = { timestamp: ts, fileUrl: url };
            document.getElementById('adminPwdInput').value = '';
            document.getElementById('modalError').classList.add('hidden');
            document.getElementById('modalTitle').innerText = url ? "刪除此檔案？" : "移除整份紀錄？";
            document.getElementById('modalDesc').innerText = url ? "這將會從雲端硬碟移除該單一檔案，但保留此日期的其他資料。" : "這將會移除此日期的所有檔案紀錄。";
            document.getElementById('deleteModal').classList.remove('hidden');
            document.body.classList.add('modal-active');
            document.getElementById('adminPwdInput').focus();
        }

        function closeDeleteModal() { 
            document.getElementById('deleteModal').classList.add('hidden'); 
            document.body.classList.remove('modal-active'); 
        }

        document.getElementById('confirmDeleteBtn').onclick = async function() {
            const pwd = document.getElementById('adminPwdInput').value;
            const err = document.getElementById('modalError');
            if (!pwd) { err.innerText = "請輸入密碼"; err.classList.remove('hidden'); return; }
            
            this.disabled = true; this.innerText = "正在處理...";
            err.classList.add('hidden');

            try {
                let apiStr = `${GAS_URL}?action=delete&timestamp=${currentDeleteParams.timestamp}&password=${encodeURIComponent(pwd)}`;
                if (currentDeleteParams.fileUrl) apiStr += `&fileUrl=${encodeURIComponent(currentDeleteParams.fileUrl)}`;
                
                const res = await fetch(apiStr);
                const result = await res.json();
                
                if (result.success) { 
                    showToast(result.message); 
                    closeDeleteModal(); 
                    fetchMeetingData(); 
                } else { 
                    err.innerText = result.message; 
                    err.classList.remove('hidden'); 
                }
            } catch (e) { 
                err.innerText = "連線失敗，請檢查網路。"; 
                err.classList.remove('hidden'); 
            } finally { 
                this.disabled = false; 
                this.innerText = "確認刪除"; 
            }
        };

        async function fetchMeetingData() {
            try {
                const res = await fetch(GAS_URL + '?action=getMeetings');
                meetingData = await res.json();
                renderCards(meetingData);
                updateYearFilter(meetingData);
            } catch (e) { 
                document.getElementById('meetingList').innerHTML = '<p class="text-center text-red-400 py-10 font-bold">資料載入失敗，請重新整理網頁。</p>'; 
            }
        }

        function updateYearFilter(data) {
            const select = document.getElementById('yearFilter');
            const years = [...new Set(data.map(i => i.date.substring(0, 4)))];
            select.innerHTML = '<option value="all">所有年份</option>' + years.sort().reverse().map(y => `<option value="${y}">${y}年</option>`).join('');
        }

        document.getElementById('searchInput').oninput = function() {
            const val = this.value.toLowerCase();
            const year = document.getElementById('yearFilter').value;
            const filtered = meetingData.filter(i => {
                const matchYear = (year === 'all' || i.date.startsWith(year));
                const matchText = i.date.includes(val) || 
                                 (i.recordData && i.recordData.name.toLowerCase().includes(val)) || 
                                 i.attachmentData.some(a => a.name.toLowerCase().includes(val));
                return matchYear && matchText;
            });
            renderCards(filtered);
        };

        document.getElementById('yearFilter').onchange = function() { 
            document.getElementById('searchInput').oninput(); 
        };

        window.onload = fetchMeetingData;
    </script>
</body>
</html>
