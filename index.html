<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>藥劑部 - 科務會議紀錄系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        .modal-active { overflow: hidden; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate-slideUp { animation: slideUp 0.3s ease-out forwards; }
        
        /* 防止長字串撐破容器 */
        .break-word { word-wrap: break-word; word-break: break-all; }
    </style>
</head>
<body class="bg-slate-100 text-slate-800 font-sans pb-20">

    <!-- 頂部標題與搜尋區 -->
    <header class="sticky top-0 z-30 bg-white/95 backdrop-blur-md shadow-sm border-b border-slate-200 px-4 py-4 sm:px-6">
        <div class="max-w-3xl mx-auto">
            <div class="flex items-center justify-between mb-4">
                <h1 class="text-xl sm:text-2xl font-black text-teal-800 flex items-center gap-2">
                    <div class="bg-teal-600 p-1.5 rounded-lg text-white">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 sm:h-6 sm:w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h10a2 2 0 012 2v1m2 13a2 2 0 01-2-2V7m2 13a2 2 0 002-2V9a2 2 0 00-2-2h-2m-4-3H9M7 16h6M7 8h6v4H7V8z" />
                        </svg>
                    </div>
                    藥劑部會議紀錄
                </h1>
                <a href="https://script.google.com/macros/s/AKfycbxUfBHRAP-IYsZ6IGpN4icI8FFWnpsIp2GL7caIzq7ePoNr3Zk7Xf-cKqWPb8J2qdQjFw/exec" 
                   target="_blank" 
                   class="inline-flex items-center bg-teal-600 text-white text-sm px-3 py-2 rounded-xl hover:bg-teal-700 transition-all font-bold shadow-md shadow-teal-100 active:scale-95">
                    <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" /></svg>
                    上傳
                </a>
            </div>
            
            <div class="flex flex-col sm:flex-row gap-2">
                <div class="relative flex-grow">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <svg class="h-5 w-5 text-slate-400" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z" clip-rule="evenodd" /></svg>
                    </div>
                    <input type="text" id="searchInput" placeholder="搜尋日期或檔案名稱..." 
                        class="block w-full pl-10 pr-4 py-2.5 border border-slate-200 rounded-xl bg-slate-50 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-teal-500 sm:text-sm transition-all">
                </div>
                <select id="yearFilter" class="block w-full sm:w-36 pl-3 pr-10 py-2.5 border border-slate-200 focus:outline-none focus:ring-2 focus:ring-teal-500 sm:text-sm rounded-xl bg-slate-50 transition-all">
                    <option value="all">所有年份</option>
                </select>
            </div>
        </div>
    </header>

    <!-- 內容清單 -->
    <main class="max-w-3xl mx-auto mt-4 px-4 sm:px-6">
        <div id="meetingList" class="flex flex-col gap-4">
            <div class="text-center py-20">
                <div class="inline-block animate-spin rounded-full h-10 w-10 border-4 border-teal-500 border-t-transparent mb-4"></div>
                <p class="text-slate-500 font-bold">正在讀取雲端會議紀錄...</p>
            </div>
        </div>
        <div id="noDataMessage" class="hidden text-center py-20">
            <div class="bg-white rounded-3xl p-10 shadow-sm border border-slate-200">
                <svg class="mx-auto h-16 w-16 text-slate-200 mb-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
                <p class="text-slate-400 font-bold">找不到符合條件的紀錄</p>
            </div>
        </div>
    </main>

    <!-- 刪除確認 Modal -->
    <div id="deleteModal" class="fixed inset-0 z-50 flex items-center justify-center hidden p-4">
        <div class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm" onclick="closeDeleteModal()"></div>
        <div class="bg-white rounded-3xl shadow-2xl z-10 w-full max-w-sm overflow-hidden animate-slideUp p-6">
            <div class="flex items-center gap-3 text-red-600 mb-3">
                <div class="bg-red-50 p-2 rounded-xl">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
                </div>
                <h3 id="modalTitle" class="text-xl font-black">確認刪除檔案？</h3>
            </div>
            <p id="modalDesc" class="text-sm text-slate-500 mb-6 font-medium">刪除後檔案將移至雲端硬碟垃圾桶，此動作無法復原。</p>
            
            <div class="mb-5">
                <label class="block text-xs font-black text-slate-400 mb-2 uppercase tracking-widest">請輸入管理密碼</label>
                <input type="password" id="adminPwdInput" class="w-full border border-slate-200 rounded-2xl px-4 py-3 focus:ring-4 focus:ring-red-100 focus:border-red-500 focus:outline-none transition-all text-center text-xl tracking-widest" placeholder="••••">
            </div>
            
            <div id="modalError" class="text-xs text-red-500 mb-5 hidden font-bold text-center bg-red-50 py-2 rounded-lg">密碼不正確，請重新輸入。</div>
            
            <div class="flex flex-col gap-2">
                <button id="confirmDeleteBtn" class="w-full px-4 py-3.5 bg-red-600 text-white rounded-2xl font-bold hover:bg-red-700 shadow-lg shadow-red-100 transition-all active:scale-95">確認刪除</button>
                <button onclick="closeDeleteModal()" class="w-full px-4 py-3 bg-white text-slate-400 rounded-2xl font-bold hover:bg-slate-50 transition-all">取消</button>
            </div>
        </div>
    </div>

    <!-- 浮動提示 -->
    <div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 z-50 px-6 py-3 bg-slate-800 text-white rounded-2xl shadow-xl opacity-0 transition-all pointer-events-none text-sm font-bold flex items-center gap-2"></div>

    <script>
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbxUfBHRAP-IYsZ6IGpN4icI8FFWnpsIp2GL7caIzq7ePoNr3Zk7Xf-cKqWPb8J2qdQjFw/exec';
        let meetingData = []; 
        let currentDeleteParams = { timestamp: null, fileUrl: null };

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.classList.remove('opacity-0', 'translate-y-4');
            t.classList.add('opacity-100', 'translate-y-0');
            setTimeout(() => { 
                t.classList.add('opacity-0', 'translate-y-4');
                t.classList.remove('opacity-100', 'translate-y-0');
            }, 3000);
        }

        function convertToPreviewLink(url) {
            if (!url) return '#';
            return url.includes('drive.google.com') ? url.replace(/\/view.*|\/edit.*/, '/preview') : url;
        }

        function renderCards(data) {
            const listContainer = document.getElementById('meetingList');
            listContainer.innerHTML = '';
            
            if (data.length === 0) { 
                document.getElementById('noDataMessage').classList.remove('hidden'); 
                return; 
            }
            document.getElementById('noDataMessage').classList.add('hidden');

            data.forEach(item => {
                // 會議主檔
                const recordHTML = item.recordData ? `
                    <div class="flex items-center gap-2 overflow-hidden">
                        <a href="${convertToPreviewLink(item.recordData.url)}" target="_blank" 
                           class="flex-grow flex items-center gap-2 bg-teal-600 text-white py-3 px-4 rounded-2xl text-sm font-black shadow-md shadow-teal-100 transition-all hover:bg-teal-700 active:scale-[0.98] overflow-hidden">
                            <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                            <span class="truncate" title="${item.recordData.name}">${item.recordData.name}</span>
                        </a>
                        <button onclick="openDeleteModal('${item.timestamp}', '${item.recordData.url}')" 
                                class="flex-shrink-0 p-3 text-slate-300 hover:text-red-500 transition-colors rounded-xl hover:bg-red-50" title="刪除主檔">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                        </button>
                    </div>` : `<div class="p-3 border-2 border-dashed border-slate-100 rounded-2xl text-xs text-slate-400 text-center font-bold bg-slate-50">主紀錄檔已移除</div>`;

                // 附件檔案
                let attachHTML = '';
                if (item.attachmentData && item.attachmentData.length > 0) {
                    item.attachmentData.forEach(file => {
                        attachHTML += `
                            <div class="flex items-center gap-2 overflow-hidden">
                                <a href="${convertToPreviewLink(file.url)}" target="_blank" 
                                   class="flex-grow flex items-center gap-2 bg-white text-slate-600 border border-slate-200 py-3 px-4 rounded-2xl text-sm font-bold shadow-sm transition-all hover:bg-slate-50 hover:border-slate-300 active:scale-[0.98] overflow-hidden">
                                    <svg class="w-4 h-4 flex-shrink-0 text-teal-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13"></path></svg>
                                    <span class="truncate" title="${file.name}">${file.name}</span>
                                </a>
                                <button onclick="openDeleteModal('${item.timestamp}', '${file.url}')" 
                                        class="flex-shrink-0 p-3 text-slate-300 hover:text-red-500 transition-colors rounded-xl hover:bg-red-50" title="刪除附件">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                                </button>
                            </div>`;
                    });
                }

                const cardHTML = `
                    <div class="bg-white rounded-[2rem] shadow-sm border border-slate-200 p-5 sm:p-6 transition-all hover:shadow-md overflow-hidden">
                        <div class="flex justify-between items-center mb-6 border-b border-slate-50 pb-4">
                            <div class="flex items-center gap-3">
                                <div class="bg-teal-50 p-2 rounded-xl text-teal-600 font-black text-xs">
                                    ${item.date.substring(0, 4)}
                                </div>
                                <h2 class="font-black text-slate-800 text-lg sm:text-xl break-all">
                                    ${item.date.substring(5)} 會議
                                </h2>
                            </div>
                            <button onclick="openDeleteModal('${item.timestamp}')" 
                                    class="text-[10px] text-slate-300 hover:text-red-400 uppercase font-black tracking-[0.2em] transition-colors bg-slate-50 px-2 py-1 rounded-lg">
                                移除全案
                            </button>
                        </div>
                        <div class="flex flex-col gap-6">
                            <div class="overflow-hidden">
                                <p class="text-[10px] text-slate-400 font-black mb-2 ml-1 uppercase tracking-widest flex items-center gap-1">
                                    <span class="w-1.5 h-1.5 bg-teal-500 rounded-full"></span> 主紀錄
                                </p>
                                ${recordHTML}
                            </div>
                            ${attachHTML ? `
                            <div class="overflow-hidden">
                                <p class="text-[10px] text-slate-400 font-black mb-2 ml-1 uppercase tracking-widest flex items-center gap-1">
                                    <span class="w-1.5 h-1.5 bg-slate-300 rounded-full"></span> 附件
                                </p>
                                <div class="flex flex-col gap-2.5">
                                    ${attachHTML}
                                </div>
                            </div>` : ''}
                        </div>
                    </div>`;
                listContainer.insertAdjacentHTML('beforeend', cardHTML);
            });
        }

        // --- Modal 控制 ---
        function openDeleteModal(ts, url = null) {
            currentDeleteParams = { timestamp: ts, fileUrl: url };
            document.getElementById('adminPwdInput').value = '';
            document.getElementById('modalError').classList.add('hidden');
            document.getElementById('modalTitle').innerText = url ? "刪除此檔案？" : "移除整筆紀錄？";
            document.getElementById('modalDesc').innerText = url ? "這將會移除該指定檔案，但保留此日期的其他資料。" : "這將會移除此日期的所有檔案與資料庫紀錄。";
            
            const modal = document.getElementById('deleteModal');
            modal.classList.remove('hidden');
            document.body.classList.add('modal-active');
            setTimeout(() => document.getElementById('adminPwdInput').focus(), 100);
        }

        function closeDeleteModal() { 
            document.getElementById('deleteModal').classList.add('hidden'); 
            document.body.classList.remove('modal-active'); 
        }

        document.getElementById('confirmDeleteBtn').onclick = async function() {
            const pwd = document.getElementById('adminPwdInput').value;
            const err = document.getElementById('modalError');
            if (!pwd) { 
                err.innerText = "請輸入密碼"; 
                err.classList.remove('hidden'); 
                return; 
            }
            
            this.disabled = true; 
            this.innerText = "處理中...";
            err.classList.add('hidden');

            try {
                let apiStr = `${GAS_URL}?action=delete&timestamp=${currentDeleteParams.timestamp}&password=${encodeURIComponent(pwd)}`;
                if (currentDeleteParams.fileUrl) apiStr += `&fileUrl=${encodeURIComponent(currentDeleteParams.fileUrl)}`;
                
                const res = await fetch(apiStr);
                const result = await res.json();
                
                if (result.success) { 
                    showToast("✅ " + result.message); 
                    closeDeleteModal(); 
                    fetchMeetingData(); 
                } else { 
                    err.innerText = result.message; 
                    err.classList.remove('hidden'); 
                }
            } catch (e) { 
                err.innerText = "連線失敗，請檢查網路。"; 
                err.classList.remove('hidden'); 
            } finally { 
                this.disabled = false; 
                this.innerText = "確認刪除"; 
            }
        };

        async function fetchMeetingData() {
            try {
                const res = await fetch(GAS_URL + '?action=getMeetings');
                meetingData = await res.json();
                renderCards(meetingData);
                updateYearFilter(meetingData);
            } catch (e) { 
                document.getElementById('meetingList').innerHTML = `
                    <div class="bg-white rounded-3xl p-10 text-center border border-red-100 shadow-sm">
                        <p class="text-red-500 font-black mb-2">載入失敗</p>
                        <button onclick="location.reload()" class="text-xs bg-slate-100 px-4 py-2 rounded-xl font-bold">重新整理</button>
                    </div>`; 
            }
        }

        function updateYearFilter(data) {
            const select = document.getElementById('yearFilter');
            const years = [...new Set(data.filter(i => i.date).map(i => i.date.substring(0, 4)))];
            select.innerHTML = '<option value="all">所有年份</option>' + 
                years.sort().reverse().map(y => `<option value="${y}">${y}年</option>`).join('');
        }

        document.getElementById('searchInput').oninput = function() {
            const val = this.value.toLowerCase();
            const year = document.getElementById('yearFilter').value;
            const filtered = meetingData.filter(i => {
                const matchYear = (year === 'all' || i.date.startsWith(year));
                const matchText = i.date.includes(val) || 
                                 (i.recordData && i.recordData.name.toLowerCase().includes(val)) || 
                                 (i.attachmentData && i.attachmentData.some(a => a.name.toLowerCase().includes(val)));
                return matchYear && matchText;
            });
            renderCards(filtered);
        };

        document.getElementById('yearFilter').onchange = function() { 
            document.getElementById('searchInput').oninput(); 
        };

        window.onload = fetchMeetingData;
    </script>
</body>
</html>
